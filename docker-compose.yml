services:
  postgres:
    image: postgres:14-alpine
    container_name: expenses_bot_postgres
    environment:
      POSTGRES_DB: expenses_bot
      POSTGRES_USER: expenses_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - expenses_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses_user -d expenses_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: expenses_bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - expenses_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenses_bot
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - expenses_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenses_bot_api
    command: python api_server.py
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - expenses_network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenses_bot_celery
    command: celery -A tasks.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    networks:
      - expenses_network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenses_bot_celery_beat
    command: celery -A tasks.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    networks:
      - expenses_network
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenses_bot_flower
    command: celery -A tasks.celery flower --port=5555
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - expenses_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  expenses_network:
    driver: bridge
